databases:
  - name: tiiu-db
    databaseName: tiiu
    user: tiiu
    plan: free

services:
  - type: web
    name: tiiu-website
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tiiu-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://tiiu-website.onrender.com"
      - key: PYTHON_VERSION
        value: "3.11.9"
